name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_NAME: flightacr2026
  IMAGE_NAME: flightapp
  WEBAPP_NAME: flight-price-predictor

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login To ACR
      uses: azure/docker-login@v2
      with:
        login-server: flightacr2026.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t flightacr2026.azurecr.io/flightapp:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push flightacr2026.azurecr.io/flightapp:${{ github.sha }}

    - name: Configure Web App Container
      run: |
        az webapp config container set \
          --name flight-price-predictor \
          --resource-group FLIGHT_MLOPS \
          --docker-custom-image-name flightacr2026.azurecr.io/flightapp:${{ github.sha }} \
          --docker-registry-server-url https://flightacr2026.azurecr.io \
          --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
          --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

    - name: Restart Web App
      run: |
        az webapp restart \
          --name flight-price-predictor \
          --resource-group FLIGHT_MLOPS