name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBAPP_NAME: flight-price-predictor
  RESOURCE_GROUP: FLIGHT_MLOPS
  ACR_LOGIN_SERVER: flightacr2026-awa6buc2h7dubxfj.azurecr.io
  IMAGE_NAME: flightapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────
      # 1. Checkout Code
      # ─────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Azure Login (4-secret method)
      # ─────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: >
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # ─────────────────────────────────────────
      # 3. Verify Azure Login
      # ─────────────────────────────────────────
      - name: Verify Azure Login
        run: az account show

      # ─────────────────────────────────────────
      # 4. Login to Azure Container Registry
      # ─────────────────────────────────────────
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ─────────────────────────────────────────
      # 5. Build Docker Image
      # ─────────────────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      # ─────────────────────────────────────────
      # 6. Push Docker Image to ACR
      # ─────────────────────────────────────────
      - name: Push Docker Image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ─────────────────────────────────────────
      # 7. Configure Web App Container Settings
      # ─────────────────────────────────────────
      - name: Configure Web App Container
        run: |
          az webapp config container set \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --docker-registry-server-url https://${{ env.ACR_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      # ─────────────────────────────────────────
      # 8. Configure App Settings (Env Vars)
      # ─────────────────────────────────────────
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              WEBSITES_PORT=5000 \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      # ─────────────────────────────────────────
      # 9. Restart Web App
      # ─────────────────────────────────────────
      - name: Restart Web App
        run: |
          az webapp restart \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      # ─────────────────────────────────────────
      # 10. Verify Deployment
      # ─────────────────────────────────────────
      - name: Verify Deployment
        run: |
          echo "Deployment complete!"
          echo "App URL: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
          az webapp show \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "{State:state, URL:defaultHostName}" \
            -o table